name: enjoyce
description: "A mobile app for the online travel agency, Enjoyce Travel and Tours"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  firebase_auth: ^4.18.0
  firebase_core: ^2.27.2
  flutter:
    sdk: flutter
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/

  fonts:
    - family: Kanit
      fonts:
        - asset: fonts/Kanit/Kanit-Regular.ttf
        - asset: fonts/Kanit/Kanit-SemiBold.ttf
          weight: 600
        - asset: fonts/Kanit/Kanit-Medium.ttf
          weight: 500
        - asset: fonts/Kanit/Kanit-Light.ttf
          weight: 300

    - family: Montserrat
      fonts:
        - asset: fonts/Montserrat/Montserrat-Regular.ttf
        - asset: fonts/Montserrat/Montserrat-Medium.ttf
          weight: 500
